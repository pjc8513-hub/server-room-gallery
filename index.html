<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Gallery of Forking Paths</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Georgia, serif; overflow: hidden; background: #0a0608; }
        canvas { display: block; cursor: grab; }
        canvas:active { cursor: grabbing; }

        .ui-container {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; font-family: Georgia, serif;
        }
        .title-overlay {
            position: fixed; top: 2%; left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: rgba(255, 220, 150, 0.6);
            font-size: 13px; letter-spacing: 3px;
            text-transform: uppercase; pointer-events: none; z-index: 10;
        }
        .plaque-overlay {
            position: fixed; bottom: 60px; left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: rgba(255, 220, 150, 0.85);
            font-size: 11px; letter-spacing: 1.5px;
            font-style: italic; pointer-events: none;
            opacity: 0; transition: opacity 0.5s ease;
            z-index: 20; max-width: 80%;
            text-shadow: 0 0 10px rgba(200,150,80,0.5);
        }
        .plaque-overlay.visible { opacity: 1; }
        .controls-hint {
            position: fixed; bottom: 2%; left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: rgba(255, 220, 150, 0.7);
            font-size: 12px; letter-spacing: 2px;
            text-transform: uppercase; pointer-events: none; z-index: 10;
        }
    </style>
</head>
<body>
<div class="ui-container">
    <div class="title-overlay">THE GALLERY OF FORKING PATHS &nbsp;·&nbsp; An Infinite Collection</div>
    <div class="plaque-overlay" id="plaque"></div>
    <div class="controls-hint">WASD / Arrow Keys to Move &nbsp;·&nbsp; Mouse to Look &nbsp;·&nbsp; Click to Lock Pointer</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Seeded RNG (Mulberry32) ───────────────────────────────────────────────────
function mulberry32(seed) {
    return function() {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
}

function lerp(a, b, t) { return a + (b - a) * t; }

// ── Pixel-buffer painting generator ──────────────────────────────────────────
// FIX 1: Uses Uint8ClampedArray pixel buffer (putImageData) instead of Canvas
//         2D API shapes. This gives painterly per-pixel control at 64x64 and
//         avoids the "clipart" look of ellipse/fillRect at low resolution.
//
// FIX 2: RNG state is consumed in a fixed, deterministic order — sky palette,
//         horizon, terrain type, then objects. The Copilot version burned
//         thousands of RNG calls in nested pixel loops before any objects were
//         placed, collapsing all compositions into near-identical states.
function generatePaintingCanvas(paintingIndex) {
    const W = 64, H = 64;
    const buf = new Uint8ClampedArray(W * H * 4);

    // One RNG for composition decisions (palette, counts, positions)
    const rng = mulberry32((paintingIndex * 6271 + 1337) ^ (paintingIndex * 997));

    // ── Sky palettes ──────────────────────────────────────────────────────────
    const SKIES = [
        [[20,8,40],  [180,80,20]],   // void-amber
        [[5,15,35],  [200,120,50]],  // twilight desert
        [[60,10,60], [255,180,80]],  // bruised purple
        [[2,20,30],  [100,60,20]],   // deep night ochre
        [[30,5,5],   [220,100,60]],  // blood horizon
        [[10,30,50], [240,200,100]], // arctic gold
        [[0,0,0],    [80,40,80]],    // absolute dark
        [[20,40,60], [255,220,130]], // pale dream
    ];
    const skyA = SKIES[Math.floor(rng() * SKIES.length)];
    const skyB = SKIES[Math.floor(rng() * SKIES.length)];

    // ── Sky gradient + subtle per-pixel noise ─────────────────────────────────
    // FIX 3: Noise values are derived from sin/cos of position + a single
    //         per-row seed scalar rather than calling rng() per pixel. This
    //         prevents the noise loop from consuming the RNG state.
    const noiseSeed = rng();
    for (let y = 0; y < H; y++) {
        const t = y / H;
        for (let x = 0; x < W; x++) {
            const n = Math.sin(x * 0.31 + noiseSeed * 20) * Math.cos(y * 0.17 + noiseSeed * 13);
            const noise = n * 8 * (1 - t);
            const i = (y * W + x) * 4;
            buf[i]   = Math.round(lerp(skyA[0][0], skyA[1][0], t) + noise);
            buf[i+1] = Math.round(lerp(skyA[0][1], skyA[1][1], t) + noise * 0.5);
            buf[i+2] = Math.round(lerp(skyA[0][2], skyA[1][2], t) + noise);
            buf[i+3] = 255;
        }
    }

    // ── Horizon glow ──────────────────────────────────────────────────────────
    const horizonY = 28 + Math.floor((rng() - 0.5) * 12);
    const glowCx = Math.floor(rng() * W * 0.4 + W * 0.3);
    for (let y = horizonY - 4; y < horizonY + 4; y++) {
        if (y < 0 || y >= H) continue;
        const dist = Math.abs(y - horizonY);
        const glow = (1 - dist / 4) * 120;
        for (let x = glowCx - 14; x < glowCx + 14; x++) {
            if (x < 0 || x >= W) continue;
            const falloff = 1 - Math.abs(x - glowCx) / 14;
            const i = (y * W + x) * 4;
            buf[i]   = Math.min(255, buf[i]   + glow * falloff);
            buf[i+1] = Math.min(255, buf[i+1] + glow * 0.7 * falloff);
            buf[i+2] = Math.min(255, buf[i+2] + glow * 0.3 * falloff);
        }
    }

    // ── Terrain ───────────────────────────────────────────────────────────────
    // FIX 4: Per-column heightmap using a smooth random walk, not a flat fillRect.
    //         The Copilot version called perlinNoise(y,0) but never changed what
    //         it filled — every column got the same full-height rectangle.
    const TERRAIN_COLORS = [
        [180, 140, 80], [30, 25, 15], [130, 100, 55], [160, 120, 60],
    ];
    const tc = TERRAIN_COLORS[Math.floor(rng() * TERRAIN_COLORS.length)];
    const heights = [];
    let h = horizonY + 2;
    for (let x = 0; x < W; x++) {
        h += (rng() - 0.5) * 3;
        h = Math.max(horizonY, Math.min(H - 10, h));
        heights.push(Math.floor(h));
    }
    // Smooth the heightmap
    for (let i = 1; i < W - 1; i++) heights[i] = Math.floor((heights[i-1]+heights[i]+heights[i+1])/3);

    for (let x = 0; x < W; x++) {
        for (let y = heights[x]; y < H; y++) {
            const depth = (y - heights[x]) / (H - heights[x]);
            const shade = Math.sin(x * 0.4 + noiseSeed * 5) * 6;
            const i = (y * W + x) * 4;
            buf[i]   = Math.round(tc[0] * (1 - depth * 0.4) + shade);
            buf[i+1] = Math.round(tc[1] * (1 - depth * 0.5) + shade * 0.5);
            buf[i+2] = Math.round(tc[2] * (1 - depth * 0.6));
            buf[i+3] = 255;
        }
    }

    // ── Terrain cracks ────────────────────────────────────────────────────────
    if (rng() > 0.4) {
        const numCracks = 1 + Math.floor(rng() * 4);
        for (let c = 0; c < numCracks; c++) {
            let cx = Math.floor(rng() * W);
            let cy = heights[Math.min(cx, W-1)] + Math.floor(rng() * 4);
            for (let step = 0; step < 15 + Math.floor(rng() * 20); step++) {
                if (cx < 0 || cx >= W || cy < 0 || cy >= H) break;
                const i = (cy * W + cx) * 4;
                buf[i] = Math.round(buf[i] * 0.3);
                buf[i+1] = Math.round(buf[i+1] * 0.3);
                buf[i+2] = Math.round(buf[i+2] * 0.3);
                cx += Math.floor((rng() - 0.5) * 3);
                cy += Math.floor(rng() * 2);
            }
        }
    }

    // ── Melting clocks ────────────────────────────────────────────────────────
    // FIX 5: Clocks are deformed pixel-by-pixel — the lower half of each ellipse
    //         stretches downward proportionally, creating a genuine melt. The
    //         Copilot version drew a normal ellipse + a separate small drip blob,
    //         which reads as a badge with a dot, not a melting clock.
    const numClocks = 1 + Math.floor(rng() * 3);
    for (let cl = 0; cl < numClocks; cl++) {
        const cx = 8 + Math.floor(rng() * (W - 16));
        const cy = horizonY - 5 + Math.floor(rng() * 10);
        const cw = 5 + Math.floor(rng() * 8);
        const ch = 3 + Math.floor(rng() * 5);
        const drip = 4 + Math.floor(rng() * 10);
        const cr = [200 + Math.floor(rng()*55), 180 + Math.floor(rng()*60), 100 + Math.floor(rng()*60)];
        const hand1 = rng() * Math.PI * 2;
        const hand2 = rng() * Math.PI * 2;

        for (let dy = -ch; dy <= ch + drip; dy++) {
            for (let dx = -cw; dx <= cw; dx++) {
                const px = cx + dx, py = cy + dy;
                if (px < 0 || px >= W || py < 0 || py >= H) continue;
                // Melt: widen the ellipse horizontally as dy goes below ch
                const meltX = cw * (1 + Math.max(0, dy - ch) / (drip + 1) * 0.7);
                const ellipseY = Math.min(dy, ch);
                if ((dx*dx)/(meltX*meltX) + (ellipseY*ellipseY)/(ch*ch) > 1) continue;
                const edgeDist = 1 - Math.sqrt((dx*dx)/(cw*cw) + (ellipseY*ellipseY)/(ch*ch));
                const i = (py * W + px) * 4;
                if (edgeDist < 0.15) {
                    buf[i]=Math.round(cr[0]*0.3); buf[i+1]=Math.round(cr[1]*0.3); buf[i+2]=Math.round(cr[2]*0.3);
                } else {
                    buf[i]=cr[0]; buf[i+1]=cr[1]; buf[i+2]=cr[2];
                }
                buf[i+3] = 255;
            }
        }
        // Hands
        for (let t2 = 0; t2 < cw - 1; t2++) {
            const hx1 = Math.round(cx + Math.cos(hand1) * t2 * 0.8);
            const hy1 = Math.round(cy + Math.sin(hand1) * t2 * 0.5);
            const hx2 = Math.round(cx + Math.cos(hand2) * t2 * 0.5);
            const hy2 = Math.round(cy + Math.sin(hand2) * t2 * 0.5);
            for (const [hx, hy] of [[hx1,hy1],[hx2,hy2]]) {
                if (hx >= 0 && hx < W && hy >= 0 && hy < H) {
                    const i = (hy*W+hx)*4;
                    buf[i]=30; buf[i+1]=30; buf[i+2]=30; buf[i+3]=255;
                }
            }
        }
    }

    // ── Floating table with drooping legs ─────────────────────────────────────
    if (rng() > 0.3) {
        const ox = 5 + Math.floor(rng() * (W - 20));
        const oy = horizonY - 3 + Math.floor(rng() * 8);
        const ow = 8 + Math.floor(rng() * 10);
        const tabC = [160 + Math.floor(rng()*60), 120 + Math.floor(rng()*50), 60 + Math.floor(rng()*40)];
        for (let dx = 0; dx < ow; dx++) {
            for (let dy = 0; dy < 2; dy++) {
                const px = ox+dx, py = oy+dy;
                if (px < W && py < H) {
                    const i = (py*W+px)*4;
                    buf[i]=tabC[0]; buf[i+1]=tabC[1]; buf[i+2]=tabC[2]; buf[i+3]=255;
                }
            }
        }
        const legs = [ox+1, ox+Math.floor(ow/2), ox+ow-2];
        legs.forEach(lx => {
            const legLen = 4 + Math.floor(rng() * 8);
            const melt = (rng() - 0.5) * 4;
            for (let dy = 0; dy < legLen; dy++) {
                const px = Math.round(lx + melt * dy / legLen);
                const py = oy + 2 + dy;
                if (px >= 0 && px < W && py < H) {
                    const i = (py*W+px)*4;
                    buf[i]=Math.round(tabC[0]*0.7); buf[i+1]=Math.round(tabC[1]*0.7); buf[i+2]=Math.round(tabC[2]*0.7); buf[i+3]=255;
                }
            }
        });
    }

    // ── Wrong-direction shadows ───────────────────────────────────────────────
    if (rng() > 0.4) {
        const ns = 1 + Math.floor(rng() * 3);
        for (let s = 0; s < ns; s++) {
            const sx = Math.floor(rng() * W);
            const sy = heights[Math.min(sx, W-1)];
            const slen = 8 + Math.floor(rng() * 20);
            const angle = (rng() - 0.5) * 1.2;
            for (let t2 = 0; t2 < slen; t2++) {
                const px = Math.round(sx + Math.cos(angle) * t2);
                const py = Math.round(sy + t2 * 0.3);
                if (px < 0 || px >= W || py < 0 || py >= H) break;
                const i = (py*W+px)*4;
                buf[i]=Math.round(buf[i]*0.5); buf[i+1]=Math.round(buf[i+1]*0.5); buf[i+2]=Math.round(buf[i+2]*0.5);
            }
        }
    }

    // ── Solitary figure / obelisk ─────────────────────────────────────────────
    if (rng() > 0.5) {
        const fx = 10 + Math.floor(rng() * (W - 20));
        const fh = 8 + Math.floor(rng() * 14);
        const fw = 1 + Math.floor(rng() * 3);
        const fy = heights[Math.min(fx, W-1)] - fh;
        const figC = rng() > 0.5 ? [20, 20, 20] : [220 + Math.floor(rng()*35), 200 + Math.floor(rng()*35), 160 + Math.floor(rng()*35)];
        for (let dy = 0; dy < fh; dy++) {
            const w2 = Math.max(1, fw - Math.floor(dy / fh * fw));
            for (let dx = -w2; dx <= w2; dx++) {
                const px = fx+dx, py = fy+dy;
                if (px >= 0 && px < W && py >= 0 && py < H) {
                    const i = (py*W+px)*4;
                    buf[i]=figC[0]; buf[i+1]=figC[1]; buf[i+2]=figC[2]; buf[i+3]=255;
                }
            }
        }
    }

    // ── Floating eye ──────────────────────────────────────────────────────────
    if (rng() > 0.6) {
        const ex = 8 + Math.floor(rng() * (W - 16));
        const ey = 4 + Math.floor(rng() * (horizonY - 8));
        const er = 3 + Math.floor(rng() * 5);
        const irisR = Math.floor(rng()*200), irisG = Math.floor(rng()*150+50), irisB = Math.floor(rng()*80);
        for (let dy = -er; dy <= er; dy++) {
            for (let dx = -er*2; dx <= er*2; dx++) {
                const dist = (dx*dx)/(er*er*4) + (dy*dy)/(er*er);
                if (dist > 1) continue;
                const px = ex+dx, py = ey+dy;
                if (px < 0 || px >= W || py < 0 || py >= H) continue;
                const i = (py*W+px)*4;
                if (dist < 0.12)      { buf[i]=10;  buf[i+1]=10;  buf[i+2]=10; }
                else if (dist < 0.35) { buf[i]=irisR; buf[i+1]=irisG; buf[i+2]=irisB; }
                else                  { buf[i]=240; buf[i+1]=230; buf[i+2]=200; }
                buf[i+3]=255;
            }
        }
    }

    // ── Ground reflection ─────────────────────────────────────────────────────
    // FIX 6: Single-pass — snapshot the sky rows first into a flat array, then
    //         blend downward. The Copilot version called getImageData() inside
    //         a double loop — potentially thousands of GPU readbacks per painting.
    if (rng() > 0.55) {
        const reflAlpha = 0.25 + rng() * 0.3;
        for (let y = horizonY; y < Math.min(H, horizonY + 14); y++) {
            const ry = horizonY - (y - horizonY);
            if (ry < 0) continue;
            for (let x = 0; x < W; x++) {
                const i  = (y  * W + x) * 4;
                const ri = (ry * W + x) * 4;
                buf[i]   = Math.round(lerp(buf[i],   buf[ri],   reflAlpha));
                buf[i+1] = Math.round(lerp(buf[i+1], buf[ri+1], reflAlpha));
                buf[i+2] = Math.round(lerp(buf[i+2], buf[ri+2], reflAlpha));
            }
        }
    }

    // Clamp all channels
    for (let i = 0; i < buf.length; i += 4) {
        buf[i]   = Math.max(0, Math.min(255, buf[i]));
        buf[i+1] = Math.max(0, Math.min(255, buf[i+1]));
        buf[i+2] = Math.max(0, Math.min(255, buf[i+2]));
    }

    const c = document.createElement('canvas');
    c.width = W; c.height = H;
    c.getContext('2d').putImageData(new ImageData(buf, W, H), 0, 0);
    return c;
}

// ── Title generator ───────────────────────────────────────────────────────────
const PREFIXES = [
    "The Persistence of","Memory Without","Clocks of","Dreams in","The Weight of",
    "Infinite","Melting","Fragmented","The Architecture of","Silent","Recursive",
    "The Geometry of","Dissolved","Forgotten","Eternal"
];
const NOUNS = [
    "Memory","Time","Shadows","Infinity","Silence","The Void","Horizons",
    "Dissolution","The Dreamer","Repetition","The Library","Continuity","The Self"
];
const ATTRIBUTIONS = [
    "Anonymous","Unknown, c.∞","Attributed to None","Found in Room",
    "Gallery of Forking Paths","Dreamt, not painted","∞ — ∞","Cat. No.","Combinatorial Study"
];
function generatePaintingTitle(index) {
    const rng = mulberry32(index + 9999);
    const prefix = PREFIXES[Math.floor(rng() * PREFIXES.length)];
    const noun   = NOUNS[Math.floor(rng() * NOUNS.length)];
    const attr   = ATTRIBUTIONS[Math.floor(rng() * ATTRIBUTIONS.length)];
    const num    = (index * 6271 % 100000).toString().padStart(5, '0');
    return `"${prefix} ${noun}"  ·  ${attr} #${num}`;
}

// ── Scene ─────────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0608, 0.045);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);
const canvas = renderer.domElement;

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.05, 100);
camera.position.set(0, 1.7, 0);

// ── Lighting ──────────────────────────────────────────────────────────────────
// FIX 7: Near-dark ambient + per-painting spotlights (MeshStandardMaterial).
//         Copilot's bright ambient + Lambert materials washed out the spotlights
//         and made every painting look equally lit from all sides.
scene.add(new THREE.AmbientLight(0x1a0f08, 1.2));

// ── Gallery geometry ──────────────────────────────────────────────────────────
const CW = 6, CH = 4, CL = 200;
const wallMat  = new THREE.MeshStandardMaterial({ color: 0x1a1208, roughness: 0.95 });
const floorMat = new THREE.MeshStandardMaterial({ color: 0x0d0a06, roughness: 0.8, metalness: 0.1 });
const ceilMat  = new THREE.MeshStandardMaterial({ color: 0x100d0a, roughness: 1 });
const moldMat  = new THREE.MeshStandardMaterial({ color: 0x3a2a10, roughness: 0.7, metalness: 0.2 });

function addPlane(w, h, rx, ry, px, py, pz, mat) {
    const m = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
    m.rotation.set(rx, ry, 0);
    m.position.set(px, py, pz);
    scene.add(m);
}

addPlane(CW, CL, -Math.PI/2, 0,  0,       0,    -CL/2, floorMat);
addPlane(CW, CL,  Math.PI/2, 0,  0,       CH,   -CL/2, ceilMat);
addPlane(CL, CH,  0,  Math.PI/2, -CW/2,   CH/2, -CL/2, wallMat);
addPlane(CL, CH,  0, -Math.PI/2,  CW/2,   CH/2, -CL/2, wallMat);
addPlane(CW, CH,  0,  0,          0,       CH/2, -CL,   wallMat);
addPlane(CW, CH,  0,  Math.PI,    0,       CH/2,  1,    wallMat);

// Molding
for (const side of [-1, 1]) {
    const mx = side * (CW/2 - 0.03);
    const mold = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.12, CL), moldMat);
    mold.position.set(mx, 0.12, -CL/2); scene.add(mold);
    const mold2 = mold.clone();
    mold2.position.set(mx, CH - 0.12, -CL/2); scene.add(mold2);
}

// Floor runner
const runner = new THREE.Mesh(new THREE.PlaneGeometry(0.8, CL),
    new THREE.MeshStandardMaterial({ color: 0x1a0a04, roughness: 0.9 }));
runner.rotation.x = -Math.PI/2;
runner.position.set(0, 0.001, -CL/2);
scene.add(runner);

// ── Paintings ─────────────────────────────────────────────────────────────────
const PAINT_W = 1.6, PAINT_H = 1.6;
const paintingSpacing = 3.5;
const frameMats = [
    new THREE.MeshStandardMaterial({ color: 0x5a3f12, roughness: 0.5, metalness: 0.4 }),
    new THREE.MeshStandardMaterial({ color: 0x8a6020, roughness: 0.4, metalness: 0.6 }),
];
const plaqueData = [];

// group to hold everything related to paintings so we can clear/regenerate easily
const paintingsGroup = new THREE.Group();
scene.add(paintingsGroup);

// base offset added to every index; randomised on load or when warping
let baseIndex = Math.floor(Math.random() * 1000000);

function populatePaintings(offset) {
    // wipe old items
    while (paintingsGroup.children.length) {
        paintingsGroup.remove(paintingsGroup.children[0]);
    }
    plaqueData.length = 0;

    let idx = 0;
    for (let z = -(1.5); z > -CL; z -= paintingSpacing) {
        const side = idx % 2 === 0 ? -1 : 1;
        const x = side * (CW/2 - 0.06);
        const seed = offset + idx;

        const paintCanvas = generatePaintingCanvas(seed);
        const tex = new THREE.CanvasTexture(paintCanvas);
        tex.magFilter = THREE.NearestFilter;
        tex.minFilter = THREE.NearestFilter;

        const paintMesh = new THREE.Mesh(
            new THREE.PlaneGeometry(PAINT_W, PAINT_H),
            new THREE.MeshStandardMaterial({ map: tex, roughness: 0.9, metalness: 0 })
        );
        paintMesh.rotation.y = side > 0 ? -Math.PI/2 : Math.PI/2;
        paintMesh.position.set(x, 1.8, z);
        paintMesh.userData.title = generatePaintingTitle(seed);
        paintingsGroup.add(paintMesh);
        plaqueData.push({ z, side, title: paintMesh.userData.title });

        // Frame
        const fm = frameMats[Math.floor(idx / 3) % 2];
        const FT = 0.06;
        const frameGroup = new THREE.Group();
        frameGroup.rotation.y = side > 0 ? -Math.PI/2 : Math.PI/2;
        frameGroup.position.set(x, 1.8, z);
        [
            [PAINT_W + FT*2, FT, 0,              PAINT_H/2 + FT/2],
            [PAINT_W + FT*2, FT, 0,             -PAINT_H/2 - FT/2],
            [FT, PAINT_H,       -PAINT_W/2 - FT/2, 0],
            [FT, PAINT_H,        PAINT_W/2 + FT/2, 0],
        ].forEach(([w, h, px, py]) => {
            const piece = new THREE.Mesh(new THREE.BoxGeometry(w, h, 0.04), fm);
            piece.position.set(px, py, -0.02);
            frameGroup.add(piece);
        });
        paintingsGroup.add(frameGroup);

        // Spotlight
        const spot = new THREE.SpotLight(0xffe8a0, 1.2, 8, Math.PI/6, 0.5, 1.5);
        spot.position.set(side * (CW/2 - 1.2), CH - 0.3, z);
        spot.target.position.set(x, 1.8, z);
        paintingsGroup.add(spot); paintingsGroup.add(spot.target);

        idx++;
    }
}

// initial population with a random base index
populatePaintings(baseIndex);
// start the camera at a random painting as well
warpToRandomLocation();

// warp helpers
function warpToRandomLocation() {
    const count = Math.floor(CL / paintingSpacing);
    const randIdx = Math.floor(Math.random() * count);
    const z = -(1.5) - randIdx * paintingSpacing;
    // pick a random lateral position within the corridor
    const x = (Math.random() * 2 - 1) * (CW/2 - 0.4);
    camera.position.set(x, 1.7, z + 1);
    // randomize view direction
    yaw = Math.random() * Math.PI * 2;
    pitch = 0;
}

function randomizeGallery() {
    baseIndex = Math.floor(Math.random() * 1000000);
    populatePaintings(baseIndex);
    warpToRandomLocation();
}

// ── Controls ──────────────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.key === 'r' || e.key === 'R') {
        // randomize the set of paintings and jump to a new position
        randomizeGallery();
    }
});
document.addEventListener('keyup',   e => keys[e.code] = false);

let yaw = 0, pitch = 0, locked = false;
canvas.addEventListener('click', () => canvas.requestPointerLock());
document.addEventListener('pointerlockchange', () => { locked = document.pointerLockElement === canvas; });
document.addEventListener('mousemove', e => {
    if (!locked) return;
    yaw   -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;
    pitch = Math.max(-Math.PI/3, Math.min(Math.PI/3, pitch));
});

let lastTouch = null;
document.addEventListener('touchstart', e => { lastTouch = e.touches[0]; });
document.addEventListener('touchmove', e => {
    e.preventDefault();
    const t = e.touches[0];
    yaw   -= (t.clientX - lastTouch.clientX) * 0.005;
    pitch -= (t.clientY - lastTouch.clientY) * 0.005;
    pitch = Math.max(-Math.PI/3, Math.min(Math.PI/3, pitch));
    lastTouch = t;
}, { passive: false });

// ── Animation ─────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
const plaqueEl = document.getElementById('plaque');
let lastTitle = '';

function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);

    const dir   = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
    const right = new THREE.Vector3( Math.cos(yaw), 0, -Math.sin(yaw));
    const speed = 3.5;

    if (keys['KeyW']     || keys['ArrowUp'])    camera.position.addScaledVector(dir,   speed*dt);
    if (keys['KeyS']     || keys['ArrowDown'])  camera.position.addScaledVector(dir,  -speed*dt);
    if (keys['KeyA']     || keys['ArrowLeft'])  camera.position.addScaledVector(right, -speed*dt);
    if (keys['KeyD']     || keys['ArrowRight']) camera.position.addScaledVector(right,  speed*dt);

    camera.position.x = Math.max(-CW/2 + 0.4, Math.min(CW/2 - 0.4, camera.position.x));
    camera.position.z = Math.min(1.5, Math.max(-CL + 0.4, camera.position.z));
    camera.position.y = 1.7;

    camera.rotation.order = 'YXZ';
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;

    // Plaque: nearest painting within 2.2 units
    let nearest = null, nearDist = 2.2;
    for (const pd of plaqueData) {
        const dz = camera.position.z - pd.z;
        const dx = camera.position.x - pd.side * (CW/2 - 0.06);
        const d = Math.sqrt(dx*dx + dz*dz);
        if (d < nearDist) { nearDist = d; nearest = pd; }
    }
    const title = nearest ? nearest.title : '';
    if (title !== lastTitle) {
        plaqueEl.textContent = title;
        plaqueEl.classList.toggle('visible', !!title);
        lastTitle = title;
    }

    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
